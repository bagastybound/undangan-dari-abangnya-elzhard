<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Undangan Spesial 💖</title>

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fecfef);
    text-align: center;
    overflow: hidden;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 20px;
    width: 350px;
    margin: 80px auto;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    animation: fadeIn 1.5s;
}

h1 {
    color: #ff4d6d;
}

button {
    margin: 8px;
    padding: 10px 15px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-size: 14px;
}

.yes {
    background: #ff4d6d;
    color: white;
}

.no {
    background: #ccc;
    position: relative;
}

.music {
    background: #6c5ce7;
    color: white;
}

.love {
    position: fixed;
    top: -10px;
    color: red;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(100vh);
    }
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1;}
}
</style>
</head>

<body>

<audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<div class="card">
    <h1>Hai Zara 😳💖</h1>
    <p>Aku mau ngajak ketemu nih 😊</p>

    <h3>📅 Rabu, 16.00</h3>
    <h3>📍 Jalan-jalan sore & Cafe ☕</h3>

    <h3>📌 Rundown:</h3>
    <ul style="text-align:left;">
        <li>✨ Ketemu (deg-degan dikit gapapa 😆)</li>
        <li>🌇 Jalan-jalan sore santai</li>
        <li>☕ Ngopi bareng</li>
        <li>😏 Lanjut kalau kamu nyaman...</li>
    </ul>

    <p>Zara… jangan bilang nggak ya 🥺👉👈</p>

    <button class="yes" onclick="yes()">Mau dong 💖</button>
    <button class="no" onclick="no(this)">Nggak 😅</button>
    <br>
    <button class="music" onclick="toggleMusic()">🎵 Play / Pause</button>

    <p id="respon"></p>
</div>

<script>
const music = document.getElementById("music");

document.body.addEventListener("click", function () {
    music.play().catch(() => {});
}, { once: true });

function toggleMusic() {
    if (music.paused) {
        music.play();
    } else {
        music.pause();
    }
}

function yes() {
    document.getElementById("respon").innerHTML = 
    "Nah gitu dong 😆💖 Aku jadi makin semangat nunggu kamu, Zara!";
}

function no(btn) {
    btn.style.position = "absolute";
    btn.style.top = Math.random() * 200 + "px";
    btn.style.left = Math.random() * 200 + "px";
}

function createLove() {
    const love = document.createElement("div");
    love.classList.add("love");
    love.innerHTML = "💖";
    love.style.left = Math.random() * 100 + "vw";
    love.style.animationDuration = (Math.random() * 3 + 2) + "s";

    document.body.appendChild(love);

    setTimeout(() => {
        love.remove();
    }, 5000);
}

setInterval(createLove, 300);
</script>

</body>
</html>
